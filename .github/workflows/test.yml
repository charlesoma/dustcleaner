name: Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Install dependencies
      run: go mod download
    
    - name: Run unit tests
      run: go test -v -race -coverprofile=coverage.out ./...
    
    - name: Run linter
      uses: golangci/golangci-lint-action@v3
      with:
        version: latest
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella

  integration-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Install Bitcoin Core
      run: |
        sudo add-apt-repository ppa:bitcoin/bitcoin -y
        sudo apt-get update
        sudo apt-get install -y bitcoind bitcoin-cli
    
    - name: Start Bitcoin Core regtest
      run: |
        bitcoind -regtest -daemon
        sleep 5
        bitcoin-cli -regtest createwallet testwallet || true
        bitcoin-cli -regtest -rpcwallet=testwallet getnewaddress
        bitcoin-cli -regtest generatetoaddress 101 $(bitcoin-cli -regtest -rpcwallet=testwallet getnewaddress)
    
    - name: Install dependencies
      run: go mod download
    
    - name: Run integration tests
      run: go test -v -tags=integration ./integration
      env:
        BITCOIN_RPC_URL: http://127.0.0.1:18443
        BITCOIN_RPC_USER: $(cat ~/.bitcoin/regtest/.cookie | cut -d: -f1)
        BITCOIN_RPC_PASS: $(cat ~/.bitcoin/regtest/.cookie | cut -d: -f2)
    
    - name: Stop Bitcoin Core
      if: always()
      run: bitcoin-cli -regtest stop

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.21']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go-version }}
    
    - name: Build
      run: go build -v ./...
    
    - name: Test build
      run: go test -v -short ./...
